<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="50%" stop-color="#e8a000"/>
      <stop offset="100%" stop-color="#c97d00"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="160" cy="160" r="155" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <circle cx="160" cy="160" r="148" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>

  <!-- Trophy cup body -->
  <path d="M130 210 Q128 230 118 245 L202 245 Q192 230 190 210 Z" fill="url(#gold)" opacity="0.9"/>
  <!-- Trophy base -->
  <rect x="112" y="244" width="96" height="10" rx="4" fill="url(#gold)"/>
  <rect x="104" y="252" width="112" height="8" rx="3" fill="url(#gold)" opacity="0.8"/>

  <!-- Trophy cup upper -->
  <path d="M128 155 Q118 165 116 178 Q114 192 120 200 Q126 208 130 210 L190 210 Q194 208 200 200 Q206 192 204 178 Q202 165 192 155 Z" fill="url(#gold)"/>

  <!-- Trophy handles -->
  <path d="M128 165 Q108 165 106 180 Q104 195 116 198" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <path d="M192 165 Q212 165 214 180 Q216 195 204 198" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- Trophy neck -->
  <rect x="148" y="150" width="24" height="10" rx="3" fill="url(#gold)" opacity="0.9"/>

  <!-- Cup highlight -->
  <path d="M138 168 Q148 164 162 166" fill="none" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Stars above trophy (3 stars) -->
  <g fill="url(#gold)" filter="url(#glow)" opacity="0.9">
    <polygon points="160,108 163,118 174,118 165,124 168,134 160,128 152,134 155,124 146,118 157,118" transform="scale(0.65) translate(86,100)"/>
    <polygon points="160,108 163,118 174,118 165,124 168,134 160,128 152,134 155,124 146,118 157,118" transform="scale(0.65) translate(156,88)"/>
    <polygon points="160,108 163,118 174,118 165,124 168,134 160,128 152,134 155,124 146,118 157,118" transform="scale(0.65) translate(226,100)"/>
  </g>

  <!-- FIFA text -->
  <text x="160" y="82" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="13" font-weight="900" letter-spacing="4" fill="url(#silver)" opacity="0.9">FIFA</text>

  <!-- WORLD CUP text -->
  <text x="160" y="282" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="11" font-weight="900" letter-spacing="2.5" fill="url(#silver)" opacity="0.85">WORLD CUP</text>

  <!-- 2026 -->
  <text x="160" y="302" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" letter-spacing="3" fill="url(#gold)">2026</text>

  <!-- Host flag colors arc at bottom -->
  <path d="M 60 285 A 105 105 0 0 1 260 285" fill="none" stroke="#B22234" stroke-width="2" opacity="0.4"/>
</svg>
