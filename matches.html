<script>
document.addEventListener("DOMContentLoaded", () => {
  buildNav("matches");
  buildFooter("footer");
  window._fullSchedule = buildFullSchedule();
  renderMatches();
  renderLivePredictor();
  initScrollAnimations();
});

// ── helpers ──────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Build the complete 104-match schedule ─────────────────────
function buildFullSchedule() {
  // Start with all real matches from data.js
  const schedule = MATCHES.map(m => Object.assign({}, m, { matchday: m.stage.startsWith("Group") ? 1 : null }));
  
  // Find the highest ID to continue from
  let nextId = Math.max(...MATCHES.map(m => m.id), 0) + 1;

  // MD2/MD3 config per group
  const GS_CONFIG = {
    A: { md2:"2026-06-23", v2:"SoFi Stadium",             md3:"2026-07-01", v3:"Estadio Azteca"          },
    B: { md2:"2026-06-23", v2:"BMO Field",                md3:"2026-07-01", v3:"BC Place"                },
    C: { md2:"2026-06-24", v2:"NRG Stadium",              md3:"2026-07-01", v3:"MetLife Stadium"          },
    D: { md2:"2026-06-24", v2:"Arrowhead Stadium",        md3:"2026-07-01", v3:"AT&T Stadium"             },
    E: { md2:"2026-06-25", v2:"Gillette Stadium",         md3:"2026-07-02", v3:"NRG Stadium"              },
    F: { md2:"2026-06-25", v2:"Lincoln Financial Field",  md3:"2026-07-02", v3:"Gillette Stadium"         },
    G: { md2:"2026-06-26", v2:"Levi's Stadium",           md3:"2026-07-02", v3:"Lumen Field"              },
    H: { md2:"2026-06-26", v2:"Estadio BBVA",             md3:"2026-07-02", v3:"Hard Rock Stadium"        },
    I: { md2:"2026-06-27", v2:"AT&T Stadium",             md3:"2026-07-03", v3:"Arrowhead Stadium"        },
    J: { md2:"2026-06-27", v2:"Hard Rock Stadium",        md3:"2026-07-03", v3:"NRG Stadium"              },
    K: { md2:"2026-06-28", v2:"Lumen Field",              md3:"2026-07-03", v3:"Gillette Stadium"         },
    L: { md2:"2026-06-28", v2:"Lincoln Financial Field",  md3:"2026-07-03", v3:"SoFi Stadium"             },
  };

  const groupLetters = "ABCDEFGHIJKL".split("");

  groupLetters.forEach(grp => {
    const cfg = GS_CONFIG[grp];
    const groupTeams = TEAMS.filter(t => t.group === grp).map(t => t.id);
    // All possible pairs
    const allPairs = [];
    for (let i = 0; i < groupTeams.length; i++)
      for (let j = i + 1; j < groupTeams.length; j++)
        allPairs.push([groupTeams[i], groupTeams[j]]);

    // Pairs already played (MD1)
    const playedPairs = MATCHES
      .filter(m => m.stage === "Group " + grp)
      .map(m => [m.home, m.away]);

    // Remaining pairs
    const remaining = allPairs.filter(([a, b]) =>
      !playedPairs.some(([h, aw]) => (h === a && aw === b) || (h === b && aw === a))
    );

    // MD2: pairs 0 and 1
    const md2Times = ["20:00", "17:00"];
    remaining.slice(0, 2).forEach((pair, idx) => {
      schedule.push({
        id: nextId++, stage: "Group " + grp, matchday: 2,
        home: pair[0], away: pair[1],
        date: cfg.md2, time: md2Times[idx], venue: cfg.v2,
        homeScore: null, awayScore: null
      });
    });

    // MD3: pairs 2 and 3 (simultaneous at 20:00)
    remaining.slice(2, 4).forEach(pair => {
      schedule.push({
        id: nextId++, stage: "Group " + grp, matchday: 3,
        home: pair[0], away: pair[1],
        date: cfg.md3, time: "20:00", venue: cfg.v3,
        homeScore: null, awayScore: null
      });
    });
  });

  // ── Knockout placeholders ─────────────────────────────────
  const WC_VENUES = [
    "MetLife Stadium", "AT&T Stadium", "SoFi Stadium", "Levi's Stadium",
    "Hard Rock Stadium", "Arrowhead Stadium", "Lumen Field", "Lincoln Financial Field",
    "Gillette Stadium", "NRG Stadium", "Estadio Azteca", "Estadio BBVA",
    "Estadio Akron", "BMO Field", "BC Place", "Stade de Montréal"
  ];

  // Round of 32: Only add placeholders if they don't exist in MATCHES
  const r32Dates = ["2026-07-06","2026-07-07","2026-07-08","2026-07-09"];
  let venueIdx = 0;
  
  // Check how many R32 matches we already have
  const existingR32 = MATCHES.filter(m => m.stage === "Round of 32").length;
  const remainingR32 = 16 - existingR32;

  if (remainingR32 > 0) {
    // This is a simplified logic to fill up to 16 matches
    // In a real scenario, we'd want to match specific dates
    for (let i = 0; i < remainingR32; i++) {
      const date = r32Dates[Math.floor(i / 4)];
      const time = (i % 2 === 0) ? "17:00" : "20:00";
      schedule.push({
        id: nextId++, stage: "Round of 32", matchday: null,
        home: "tbd", away: "tbd",
        date, time, venue: WC_VENUES[venueIdx % 16],
        homeScore: null, awayScore: null
      });
      venueIdx++;
    }
  }

  // Round of 16: 8 matches, 2/day from 2026-07-11 through 2026-07-14
  const r16Dates = ["2026-07-11","2026-07-12","2026-07-13","2026-07-14"];
  r16Dates.forEach(date => {
    ["17:00","20:00"].forEach(time => {
      schedule.push({
        id: nextId++, stage: "Round of 16", matchday: null,
        home: "tbd", away: "tbd",
        date, time, venue: WC_VENUES[venueIdx % 16],
        homeScore: null, awayScore: null
      });
      venueIdx++;
    });
  });

  // Quarter-final: 4 matches
  [
    { date:"2026-07-15", time:"17:00", venue:"MetLife Stadium"  },
    { date:"2026-07-15", time:"21:00", venue:"AT&T Stadium"     },
    { date:"2026-07-16", time:"17:00", venue:"SoFi Stadium"     },
    { date:"2026-07-16", time:"21:00", venue:"NRG Stadium"      },
  ].forEach(m => {
    schedule.push({ id: nextId++, stage: "Quarter-final", matchday: null, home:"tbd", away:"tbd", homeScore:null, awayScore:null, ...m });
  });

  // Semi-final: 2 matches
  [
    { date:"2026-07-18", time:"20:00", venue:"MetLife Stadium" },
    { date:"2026-07-19", time:"15:00", venue:"AT&T Stadium"    },
  ].forEach(m => {
    schedule.push({ id: nextId++, stage: "Semi-final", matchday: null, home:"tbd", away:"tbd", homeScore:null, awayScore:null, ...m });
  });

  // 3rd Place
  schedule.push({
    id: nextId++, stage: "3rd Place", matchday: null,
    home:"tbd", away:"tbd",
    date:"2026-07-19", time:"12:00", venue:"Estadio Azteca",
    homeScore:null, awayScore:null
  });

  // Final
  schedule.push({
    id: nextId++, stage: "Final", matchday: null,
    home:"tbd", away:"tbd",
    date:"2026-07-19", time:"20:00", venue:"MetLife Stadium",
    homeScore:null, awayScore:null
  });

  return schedule;
}

// ── Render tabs + initial display ────────────────────────────
function renderMatches() {
  const tabs = document.getElementById("match-tabs");
  if (!tabs) return;
  const tabLabels = ["All", "Group Stage", "Round of 32", "Round of 16", "Quarter-final", "Semi-final", "Final"];
  tabs.innerHTML = tabLabels.map((label, i) =>
    `<button class="tab-btn ${i === 0 ? "active" : ""}" data-tab="${esc(label)}">${esc(label)}</button>`
  ).join("");
  tabs.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      tabs.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      displayMatches(btn.dataset.tab, window._fullSchedule);
    });
  });
  displayMatches("All", window._fullSchedule);
}

// ── Date-grouped match display ────────────────────────────────
function displayMatches(stageFilter, schedule) {
  const container = document.getElementById("matches-list");
  if (!container) return;

  // Filter
  let list;
  if (stageFilter === "All") {
    list = schedule.slice();
  } else if (stageFilter === "Group Stage") {
    list = schedule.filter(m => m.stage.startsWith("Group"));
  } else {
    list = schedule.filter(m => m.stage === stageFilter);
  }

  // Sort by date + time
  list.sort((a, b) => {
    const da = a.date + "T" + a.time, db = b.date + "T" + b.time;
    return da < db ? -1 : da > db ? 1 : 0;
  });

  if (!list.length) {
    container.innerHTML = `<div class="matches-empty">No matches found.</div>`;
    return;
  }

  // Group by date
  const byDate = {};
  list.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  const html = Object.entries(byDate).map(([dateStr, matches]) => {
    const dt = new Date(dateStr + "T12:00:00");
    const label = dt.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });

    const cards = matches.map(m => {
      if (m.home === "tbd") {
        return `
          <div class="match-card match-card-tbd card-enter">
            <div class="match-card-top">
              <span class="match-stage-pill">${esc(m.stage)}</span>
              <span class="match-time-badge">${esc(typeof localMatchTime === 'function' ? localMatchTime(m.date, m.time) : m.time)}</span>
            </div>
            <div class="match-card-venue">${esc(m.venue)}</div>
            <div class="match-card-teams" style="justify-content:center;padding:12px 0;">
              <span style="font-size:1.1rem;font-weight:800;color:var(--text-dim);letter-spacing:1px;">TBD vs TBD</span>
            </div>
            <p class="match-tbd-note">Teams to be determined</p>
          </div>`;
      }

      const home = TEAMS.find(t => t.id === m.home);
      const away = TEAMS.find(t => t.id === m.away);
      if (!home || !away) return "";
      const prob = Predictions.getProbability(m.home, m.away);
      const stagePill = m.matchday
        ? `${esc(m.stage)} · MD${m.matchday}`
        : esc(m.stage);
      // ENHANCED: Show scorers in card and penalty info
      let centerHtml = `<span class="vs-badge">VS</span>`;
      let matchStatus = "";
      
      if (m.homeScore !== null) {
        centerHtml = `<span class="final-score" style="font-size:1.3rem;font-weight:900;">${m.homeScore}–${m.awayScore}</span>`;
        
        // Show penalty shootout info if applicable
        if (m.extraScore) {
          matchStatus = `<div style="font-size:0.75rem;color:#ffd700;margin-top:4px;font-weight:600;">${esc(m.extraScore)}</div>`;
        }
        
        // Show scorers preview in card
        let scorersPreview = "";
        if (m.scorers && m.scorers.length > 0) {
          const homeScorers = m.scorers.filter(s => s.team === m.home).map(s => s.player).slice(0, 2).join(", ");
          const awayScorers = m.scorers.filter(s => s.team === m.away).map(s => s.player).slice(0, 2).join(", ");
          
          if (homeScorers || awayScorers) {
            scorersPreview = `
              <div style="font-size:0.8rem;color:var(--text-dim);margin-top:8px;border-top:1px solid rgba(255,255,255,0.1);padding-top:8px;">
                ${homeScorers ? `<div style="text-align:right;margin-bottom:4px;"><span style="color:#90EE90;">⚽ ${esc(homeScorers)}</span></div>` : ''}
                ${awayScorers ? `<div style="text-align:left;"><span style="color:#90EE90;">⚽ ${esc(awayScorers)}</span></div>` : ''}
              </div>`;
          }
        }
        
        centerHtml += matchStatus + scorersPreview;
      }

      const timeLabel = (typeof localMatchTime === 'function') ? localMatchTime(m.date, m.time) : m.time;
      return `
        <div class="match-card card-enter" data-match="${m.id}" style="cursor:pointer;">
          <div class="match-card-top">
            <span class="match-stage-pill">${stagePill}</span>
            <span class="match-time-badge">${esc(timeLabel)}</span>
          </div>
          <div class="match-card-venue">${esc(m.venue)}</div>
          <div class="match-card-teams">
            <div class="mct-team home-side">
              <div class="mct-flag">${flagImg(home.id, 48)}</div>
              <div class="mct-info">
                <span class="mct-name">${esc(home.name)}</span>
                <span class="mct-rank">FIFA #${home.ranking}</span>
              </div>
            </div>
            <div class="mct-center">
              ${centerHtml}
            </div>
            <div class="mct-team away-side">
              <div class="mct-info">
                <span class="mct-name">${esc(away.name)}</span>
                <span class="mct-rank">FIFA #${away.ranking}</span>
              </div>
              <div class="mct-flag">${flagImg(away.id, 48)}</div>
            </div>
          </div>
          <div class="prob-strip">
            <div class="prob-seg prob-h" style="width:${prob.home}%"><span>${prob.home}%</span></div>
            <div class="prob-seg prob-d" style="width:${prob.draw}%"><span>${prob.draw > 8 ? prob.draw + "%" : ""}</span></div>
            <div class="prob-seg prob-a" style="width:${prob.away}%"><span>${prob.away}%</span></div>
          </div>
          <div class="prob-legend">
            <span>${esc(home.name)} Win</span><span>Draw</span><span>${esc(away.name)} Win</span>
          </div>
        </div>`;
    }).join("");

    return `
      <div class="match-day-header">
        <span class="match-day-date">${label}</span>
        <span class="match-day-count">${matches.length} match${matches.length !== 1 ? "es" : ""}</span>
      </div>
      <div class="match-day-grid">
        ${cards}
      </div>`;
  }).join("");

  container.innerHTML = html;

  container.querySelectorAll(".match-card[data-match]").forEach(card => {
    card.addEventListener("click", () => {
      const id = +card.dataset.match;
      const m = window._fullSchedule.find(x => x.id === id);
      if (m && m.home !== "tbd") openMatchModal(m);
    });
  });

  initScrollAnimations();
}

// ── Match modal ───────────────────────────────────────────────
function openMatchModal(match) {
  const home = TEAMS.find(t => t.id === match.home);
  const away = TEAMS.find(t => t.id === match.away);
  if (!home || !away) return;
  const prob = Predictions.getProbability(match.home, match.away);
  const body = document.getElementById("modal-body");
  const dt   = new Date(match.date + "T" + match.time).toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  body.innerHTML = `
    <div class="match-modal-header">
      <h2>${esc(match.stage)}</h2><p>${dt} &bull; ${esc(typeof localMatchTime === 'function' ? localMatchTime(match.date, match.time) : match.time)}</p><p>${esc(match.venue)}</p>
    </div>
    <div class="big-matchup">
      <div class="bm-team">${flagImg(home.id, 80)}<br><strong>${esc(home.name)}</strong><br><small>FIFA #${home.ranking} &bull; Elo ${home.elo}</small></div>
      <div class="bm-vs">VS</div>
      <div class="bm-team">${flagImg(away.id, 80)}<br><strong>${esc(away.name)}</strong><br><small>FIFA #${away.ranking} &bull; Elo ${away.elo}</small></div>
    </div>
    <h3 class="modal-section-title">Pre-Match Win Probability</h3>
    <div class="big-prob-bar">
      <div class="bpb-home" style="width:${prob.home}%">${esc(home.name)} ${prob.home}%</div>
      <div class="bpb-draw" style="width:${prob.draw}%">Draw<br>${prob.draw}%</div>
      <div class="bpb-away" style="width:${prob.away}%">${esc(away.name)} ${prob.away}%</div>
    </div>
    ${match.scorers ? `
    <div class="modal-scorers mt-16" style="background:rgba(255,255,255,0.05);padding:16px;border-radius:12px;">
      <h3 class="modal-section-title" style="margin-top:0">Goal Scorers</h3>
      <div style="display:flex;justify-content:space-between;gap:20px;">
        <div style="flex:1;text-align:right;">
          ${match.scorers.filter(s => s.team === match.home).map(s => `<div>${s.player} ${s.minute}' ⚽</div>`).join('')}
        </div>
        <div style="width:1px;background:rgba(255,255,255,0.1);"></div>
        <div style="flex:1;text-align:left;">
          ${match.scorers.filter(s => s.team === match.away).map(s => `<div>⚽ ${s.player} ${s.minute}'</div>`).join('')}
        </div>
      </div>
    </div>` : ''}
    <div class="modal-scores mt-16">
      <div class="score-box"><div class="score-val">${prob.homeSqScore}</div><div class="score-lbl">${esc(home.name)} Squad</div></div>
      <div class="score-box"><div class="score-val">${prob.homeTop5}</div><div class="score-lbl">${esc(home.name)} Top-5</div></div>
      <div class="score-box"><div class="score-val">${prob.awaySqScore}</div><div class="score-lbl">${esc(away.name)} Squad</div></div>
      <div class="score-box"><div class="score-val">${prob.awayTop5}</div><div class="score-lbl">${esc(away.name)} Top-5</div></div>
    </div>
    <p class="prediction-verdict mt-10">
      🔮 <strong>${prob.home > prob.away + 10 ? esc(home.name) + " to win" : prob.away > prob.home + 10 ? esc(away.name) + " to win" : "Very close — could go either way"}</strong>
    </p>
    <div class="quick-live-link" style="margin-top:16px">
      <button class="btn-sm" onclick="document.getElementById('modal').classList.remove('open');prefillPredictor('${home.id}','${away.id}')">
        ▶ Run live in-play predictor for this match →
      </button>
    </div>`;
  document.getElementById("modal").classList.add("open");
}

function prefillPredictor(hId, aId) {
  const hs = document.getElementById("lp-home");
  const as = document.getElementById("lp-away");
  if (hs) hs.value = hId;
  if (as) as.value = aId;
  document.getElementById("live-predictor-section")?.scrollIntoView({ behavior: "smooth" });
  setTimeout(() => document.getElementById("lp-home")?.dispatchEvent(new Event("change")), 200);
}

document.addEventListener("click", e => {
  if (e.target.id === "modal" || e.target.id === "modal-close")
    document.getElementById("modal").classList.remove("open");
});

function renderLivePredictor() {
  const container = document.getElementById("live-predictor");
  if (!container) return;

  container.innerHTML = `
    <div class="lp-teams">
      <select id="lp-home">${TEAMS.map(t=>`<option value="${t.id}">${t.name}</option>`).join("")}</select>
      <span class="lp-vs">vs</span>
      <select id="lp-away">${TEAMS.map((t,i)=>`<option value="${t.id}" ${i===1?'selected':''}>${t.name}</option>`).join("")}</select>
    </div>
    <div class="lp-controls">
      <div class="lp-score-wrap">
        <label>Score</label>
        <div class="lp-score-inputs">
          <div class="lp-goals">
            <button class="goal-btn" data-team="home" data-action="minus">−</button>
            <span id="lp-home-goals">0</span>
            <button class="goal-btn" data-team="home" data-action="plus">+</button>
          </div>
          <span class="lp-score-dash">—</span>
          <div class="lp-goals">
            <button class="goal-btn" data-team="away" data-action="minus">−</button>
            <span id="lp-away-goals">0</span>
            <button class="goal-btn" data-team="away" data-action="plus">+</button>
          </div>
        </div>
      </div>
      <div class="lp-minute-wrap">
        <label>Minute: <strong id="lp-minute-val">0'</strong></label>
        <input type="range" id="lp-minute" min="0" max="120" value="0" step="1" />
      </div>
      <div class="lp-cards-wrap">
        <label>Red Cards</label>
        <div class="lp-cards">
          <span id="lp-home-flag"></span>
          <button class="card-btn" data-team="home" data-action="minus">−</button>
          <span class="red-card-count" id="lp-home-red">0 🟥</span>
          <button class="card-btn" data-team="home" data-action="plus">+</button>
          &nbsp;&nbsp;
          <button class="card-btn" data-team="away" data-action="minus">−</button>
          <span class="red-card-count" id="lp-away-red">0 🟥</span>
          <button class="card-btn" data-team="away" data-action="plus">+</button>
          <span id="lp-away-flag"></span>
        </div>
      </div>
    </div>
    <div id="lp-result" class="lp-result">
      <div class="lp-result-header">
        <span id="lp-res-home-flag"></span>
        <span id="lp-scoreline">0 – 0</span>
        <span id="lp-res-away-flag"></span>
        <span id="lp-minute-badge" class="minute-badge">0'</span>
      </div>
      <div id="lp-bar" class="big-prob-bar mt-10">
        <div class="bpb-home" id="lp-bpb-home" style="width:50%">50%</div>
        <div class="bpb-draw" id="lp-bpb-draw" style="width:25%">25%</div>
        <div class="bpb-away" id="lp-bpb-away" style="width:25%">25%</div>
      </div>
      <div class="lp-verdict" id="lp-verdict">Move the sliders to simulate a live match</div>
      <div class="lp-momentum" id="lp-momentum"></div>
    </div>`;

  const state = { home: 0, away: 0, minute: 0, homeRed: 0, awayRed: 0 };

  function updateLP() {
    const hId = document.getElementById("lp-home").value;
    const aId = document.getElementById("lp-away").value;
    if (hId === aId) return;
    const prob = Predictions.getInPlayProbability(hId, aId, state.home, state.away, state.minute, state.homeRed, state.awayRed);
    const h = TEAMS.find(t => t.id === hId), a = TEAMS.find(t => t.id === aId);

    document.getElementById("lp-res-home-flag").innerHTML = flagImg(h.id, 32);
    document.getElementById("lp-res-away-flag").innerHTML = flagImg(a.id, 32);
    document.getElementById("lp-home-flag").innerHTML = flagImg(h.id, 24);
    document.getElementById("lp-away-flag").innerHTML = flagImg(a.id, 24);
    document.getElementById("lp-scoreline").textContent = `${state.home} – ${state.away}`;
    document.getElementById("lp-minute-badge").textContent = state.minute > 90 ? `${state.minute}' ET` : state.minute === 90 ? "FT" : state.minute === 45 ? "HT" : `${state.minute}'`;
    document.getElementById("lp-verdict").textContent = prob.matchVerdict;
    document.getElementById("lp-momentum").textContent = state.minute > 0 ? `Momentum: ${prob.momentum}` : "";

    const bph = document.getElementById("lp-bpb-home");
    const bpd = document.getElementById("lp-bpb-draw");
    const bpa = document.getElementById("lp-bpb-away");
    bph.style.width = prob.home + "%"; bph.textContent = `${h.name} ${prob.home}%`;
    bpd.style.width = prob.draw + "%"; bpd.textContent = `Draw ${prob.draw}%`;
    bpa.style.width = prob.away + "%"; bpa.textContent = `${a.name} ${prob.away}%`;
  }

  document.getElementById("lp-minute").addEventListener("input", e => {
    state.minute = +e.target.value;
    document.getElementById("lp-minute-val").textContent = `${state.minute}'`;
    updateLP();
  });
  document.querySelectorAll(".goal-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const team = btn.dataset.team, act = btn.dataset.action;
      if (act === "plus")  state[team] = Math.min(20, state[team] + 1);
      if (act === "minus") state[team] = Math.max(0, state[team] - 1);
      document.getElementById(`lp-${team}-goals`).textContent = state[team];
      updateLP();
    });
  });
  document.querySelectorAll(".card-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const team = btn.dataset.team + "Red", act = btn.dataset.action;
      if (act === "plus")  state[team] = Math.min(3, state[team] + 1);
      if (act === "minus") state[team] = Math.max(0, state[team] - 1);
      document.getElementById(`lp-${btn.dataset.team}-red`).textContent = `${state[team]} 🟥`;
      updateLP();
    });
  });
  document.getElementById("lp-home").addEventListener("change", updateLP);
  document.getElementById("lp-away").addEventListener("change", updateLP);
  updateLP();
}

function initScrollAnimations() {
  const obs = new IntersectionObserver(entries => entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add("visible", "card-visible");
  }), { threshold: 0.05 });
  document.querySelectorAll(".card-enter, .section-fade").forEach(el => obs.observe(el));
}
</script>
</body>
</html>
